<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Unknown Solutions</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
    <div class="auth-card glass">
        <div class="auth-header">
            <img src="./assets/logo.png" alt="Unknown Solutions Logo" class="auth-logo" onerror="this.style.display='none'">
            <h1 class="auth-title">Welcome Back, Dreamer</h1>
            <p class="auth-subtitle">Sign in to continue your growth journey</p>
        </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <div class="auth-error" id="loginError"></div>
                <button type="submit" class="btn btn--primary auth-submit">Sign In</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="/register" class="auth-link">Register</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = '';

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });

            const data = await response.json();

            if (response.ok) {
                window.location.href = '/dashboard';
            } else {
                errorDiv.textContent = data.error || 'Login failed';
            }
        });
    </script>
</body>
</html>
