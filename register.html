<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Unknown Solutions</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
    <div class="auth-card glass">
        <div class="auth-header">
            <img src="./assets/logo.png" alt="Unknown Solutions Logo" class="auth-logo" onerror="this.style.display='none'">
            <h1 class="auth-title">Join Dreamers Island</h1>
            <p class="auth-subtitle">Start planting your business knowledge today</p>
        </div>
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" required>
                </div>
                <div class="auth-error" id="registerError"></div>
                <button type="submit" class="btn btn--primary auth-submit">Create Account</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="/login.html" class="auth-link">Sign In</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { registerUser } from './js/firebase.js';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('registerError');
            errorDiv.textContent = '';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                return;
            }

            const result = await registerUser(name, email, password);
            console.log('Register result:', result);

            if (result.success) {
                window.location.href = '/login.html?registered=true';
            } else {
                errorDiv.textContent = result.error || 'Registration failed';
            }
        });
    </script>
</body>
</html>
